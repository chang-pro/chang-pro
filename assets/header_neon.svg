    <style>
      .mono{font-family:'SFMono-Regular','Courier New',Menlo,Consolas,monospace;}
      .rain{font-family:'SFMono-Regular','Courier New',monospace;fill:#3FB950;}
      .name{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:800;letter-spacing:2px;}
      @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
      @keyframes underline{from{width:0}to{width:560px}}
      @keyframes fadein{to{opacity:1}}
      .glowpulse{animation:pulse 2.4s ease-in-out infinite;}
      .uline{animation:underline 1.2s ease-out .6s forwards;}
      .sub{opacity:0;animation:fadein .8s ease-out 1.1s forwards;}
      .tags{opacity:0;animation:fadein .8s ease-out 1.6s forwards;}
    </style>
  </defs>

