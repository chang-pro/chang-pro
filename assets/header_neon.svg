  <defs>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39C5CF"/><stop offset="0.5" stop-color="#58A6FF"/><stop offset="1" stop-color="#A371F7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#0D1117" stop-opacity="0.92"/>
      <stop offset="0.58" stop-color="#0D1117" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
